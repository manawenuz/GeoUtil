# Georgia Utility Monitor - Production Docker Compose Configuration
# This configuration runs the full stack including the app, Redis, and Postgres
# For development (databases only), use: docker-compose -f docker-compose.dev.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: utility-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: utility-monitor-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: utility_monitor
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d utility_monitor"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utility-monitor-app
    ports:
      - "3000:3000"
    environment:
      # Storage configuration
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}
      
      # Postgres configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: utility_monitor
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
      
      # Redis configuration
      REDIS_URL: redis://redis:6379
      
      # Authentication
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      
      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      
      # Notifications
      NTFY_SERVER_URL: ${NTFY_SERVER_URL:-https://ntfy.sh}
      
      # Cron
      CRON_SECRET: ${CRON_SECRET}
      
      # Scheduler
      SCHEDULER_INTERVAL_HOURS: ${SCHEDULER_INTERVAL_HOURS:-72}
      
      # Node environment
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
